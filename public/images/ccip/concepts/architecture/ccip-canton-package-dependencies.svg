<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">CCIP Canton package dependencies</title>
  <desc id="desc">Layered dependency diagram for CCIP Canton Daml packages, showing un-upgradeable base packages, interface packages, core packages, and third-party owned packages.</desc>

  <defs>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #1f2937; }
      .section-title { font-size: 13px; font-weight: 700; letter-spacing: 0.02em; text-transform: uppercase; }
      .pkg-name { font-size: 12px; font-weight: 600; }
      .pkg-version { font-size: 10px; font-weight: 500; opacity: 0.85; }
      .legend-text { font-size: 11px; font-weight: 500; }
      .arrow { stroke: #4b5563; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4b5563"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1120" height="720" fill="#ffffff"/>

  <!-- Legend -->
  <g transform="translate(760, 24)">
    <rect x="0" y="0" width="340" height="118" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="16" y="24" class="label legend-text" font-weight="700">Legend</text>

    <rect x="16" y="36" width="14" height="14" rx="3" fill="#fecaca" stroke="#dc2626" stroke-width="1.25"/>
    <text x="38" y="47" class="label legend-text">Un-upgradeable</text>

    <rect x="16" y="58" width="14" height="14" rx="3" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.25"/>
    <text x="38" y="69" class="label legend-text">Contains interfaces</text>

    <rect x="16" y="80" width="14" height="14" rx="3" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.25"/>
    <text x="38" y="91" class="label legend-text">Core implementation</text>

    <rect x="180" y="36" width="14" height="14" rx="3" fill="#c5d9e8" stroke="#1565c0" stroke-width="1.25"/>
    <text x="202" y="47" class="label legend-text">Third-party owned</text>

    <text x="16" y="110" class="label legend-text" fill="#6b7280">Downstream packages import upstream packages.</text>
  </g>

  <!-- Layer 1: Un-upgradeable -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="680" height="92" rx="10" fill="#eceff1" stroke="#bdbdbd" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="680" height="28" rx="10" fill="#dc2626"/>
    <rect x="0" y="18" width="680" height="10" fill="#dc2626"/>
    <text x="16" y="19" class="label section-title" fill="#ffffff">Un-upgradeable</text>

    <g transform="translate(24, 42)">
      <rect x="0" y="0" width="190" height="38" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="1.25"/>
      <text x="12" y="18" class="label pkg-name">chainlink-api</text>
      <text x="12" y="31" class="label pkg-version">1.0.0</text>

      <rect x="214" y="0" width="190" height="38" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="1.25"/>
      <text x="226" y="18" class="label pkg-name">ccip-codec</text>
      <text x="226" y="31" class="label pkg-version">1.0.0</text>
    </g>
  </g>

  <!-- Arrow -->
  <path class="arrow" d="M 380 132 L 380 158"/>

  <!-- Layer 2: Interfaces -->
  <g transform="translate(40, 158)">
    <rect x="0" y="0" width="680" height="104" rx="10" fill="#eceff1" stroke="#bdbdbd" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="680" height="28" rx="10" fill="#16a34a"/>
    <rect x="0" y="18" width="680" height="10" fill="#16a34a"/>
    <text x="16" y="19" class="label section-title" fill="#ffffff">Interface packages</text>

    <g transform="translate(24, 42)">
      <rect x="0" y="0" width="196" height="38" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.25"/>
      <text x="12" y="18" class="label pkg-name">ccip-api</text>
      <text x="12" y="31" class="label pkg-version">1.0.0</text>

      <rect x="212" y="0" width="210" height="38" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.25"/>
      <text x="224" y="18" class="label pkg-name">ccip-extension-api</text>
      <text x="224" y="31" class="label pkg-version">1.0.0</text>

      <rect x="438" y="0" width="210" height="38" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.25"/>
      <text x="450" y="18" class="label pkg-name">ccip-client-api</text>
      <text x="450" y="31" class="label pkg-version">1.0.0</text>
    </g>
  </g>

  <path class="arrow" d="M 380 262 L 380 288"/>

  <!-- Layer 3: Core -->
  <g transform="translate(40, 288)">
    <rect x="0" y="0" width="680" height="104" rx="10" fill="#eceff1" stroke="#bdbdbd" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="680" height="28" rx="10" fill="#546e7a"/>
    <rect x="0" y="18" width="680" height="10" fill="#546e7a"/>
    <text x="16" y="19" class="label section-title" fill="#ffffff">Core packages</text>

    <g transform="translate(24, 42)">
      <rect x="0" y="0" width="118" height="38" rx="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.25"/>
      <text x="10" y="18" class="label pkg-name">ccip-events</text>
      <text x="10" y="31" class="label pkg-version">1.0.0</text>

      <rect x="130" y="0" width="118" height="38" rx="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.25"/>
      <text x="140" y="18" class="label pkg-name">ccip-tickets</text>
      <text x="140" y="31" class="label pkg-version">1.0.0</text>

      <rect x="260" y="0" width="104" height="38" rx="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.25"/>
      <text x="270" y="18" class="label pkg-name">ccip-core</text>
      <text x="270" y="31" class="label pkg-version">1.0.0</text>

      <rect x="376" y="0" width="104" height="38" rx="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.25"/>
      <text x="386" y="18" class="label pkg-name">ccip-utils</text>
      <text x="386" y="31" class="label pkg-version">1.0.0</text>

      <rect x="492" y="0" width="118" height="38" rx="6" fill="#e5e7eb" stroke="#6b7280" stroke-width="1.25"/>
      <text x="502" y="18" class="label pkg-name">ccip-runtime</text>
      <text x="502" y="31" class="label pkg-version">1.0.0</text>
    </g>
  </g>

  <path class="arrow" d="M 380 392 L 380 418"/>

  <!-- Layer 4: Third-party -->
  <g transform="translate(40, 418)">
    <rect x="0" y="0" width="1040" height="262" rx="10" fill="#eceff1" stroke="#bdbdbd" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1040" height="28" rx="10" fill="#1565c0"/>
    <rect x="0" y="18" width="1040" height="10" fill="#1565c0"/>
    <text x="16" y="19" class="label section-title" fill="#ffffff">Third-party owned</text>

    <g transform="translate(24, 42)">
      <rect x="0" y="0" width="170" height="38" rx="6" fill="#c5d9e8" stroke="#1565c0" stroke-width="1.25"/>
      <text x="12" y="18" class="label pkg-name">ccip-executor</text>
      <text x="12" y="31" class="label pkg-version">1.0.0</text>

      <rect x="186" y="0" width="220" height="38" rx="6" fill="#c5d9e8" stroke="#1565c0" stroke-width="1.25"/>
      <text x="198" y="18" class="label pkg-name">ccip-committee-verifier</text>
      <text x="198" y="31" class="label pkg-version">1.0.0</text>

      <rect x="422" y="0" width="180" height="38" rx="6" fill="#c5d9e8" stroke="#1565c0" stroke-width="1.25"/>
      <text x="434" y="18" class="label pkg-name">ccip-rate-limiter</text>
      <text x="434" y="31" class="label pkg-version">1.0.0</text>

      <rect x="0" y="54" width="250" height="38" rx="6" fill="#c5d9e8" stroke="#1565c0" stroke-width="1.25"/>
      <text x="12" y="72" class="label pkg-name">ccip-lock-release-token-pool</text>
      <text x="12" y="85" class="label pkg-version">1.0.0</text>

      <rect x="266" y="54" width="230" height="38" rx="6" fill="#c5d9e8" stroke="#1565c0" stroke-width="1.25"/>
      <text x="278" y="72" class="label pkg-name">ccip-burn-mint-token-pool</text>
      <text x="278" y="85" class="label pkg-version">1.0.0</text>

      <rect x="0" y="118" width="160" height="38" rx="6" fill="#c5d9e8" stroke="#1565c0" stroke-width="1.25"/>
      <text x="12" y="136" class="label pkg-name">CCIPReceiver</text>

      <rect x="176" y="118" width="150" height="38" rx="6" fill="#c5d9e8" stroke="#1565c0" stroke-width="1.25"/>
      <text x="188" y="136" class="label pkg-name">CCIPSender</text>

      <text x="0" y="182" class="label legend-text" fill="#4b5563">Operators deploy and upgrade these packages on their own participants.</text>
      <text x="0" y="202" class="label legend-text" fill="#6b7280">CCIPSender and CCIPReceiver import through ccip-utils; other third-party packages import through ccip-runtime.</text>
    </g>
  </g>
</svg>
